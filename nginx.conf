events {
    worker_connections 1024;
}

stream {
    upstream mongodb_backend {
        server mongo-primary:27017 max_fails=3 fail_timeout=30s;
        server mongo-secondary:27017 backup;
    }

    server {
        listen 27017;
        proxy_pass mongodb_backend;
        proxy_connect_timeout 10s;
        proxy_timeout 30s;
    }
}
